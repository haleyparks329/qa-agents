name: Personal website evidence

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: personal-website-evidence
  cancel-in-progress: false

jobs:
  collect:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 15
    env:
      QA_TARGET_REPO_ROOT: ${{ vars.QA_TARGET_REPO_ROOT }}
      QA_KB_PATH: ${{ vars.QA_KB_PATH }}
      QA_PUBLIC_ARTIFACT_OUTPUT: ${{ vars.QA_PUBLIC_ARTIFACT_OUTPUT }}
    steps:
      - name: Checkout QA Agents
        uses: actions/checkout@v7

      - name: Validate runner configuration
        shell: bash
        run: |
          : "${QA_TARGET_REPO_ROOT:?Configure the QA_TARGET_REPO_ROOT repository variable}"
          : "${QA_KB_PATH:?Configure the QA_KB_PATH repository variable}"
          : "${QA_PUBLIC_ARTIFACT_OUTPUT:?Configure the QA_PUBLIC_ARTIFACT_OUTPUT repository variable}"
          test -d "$QA_TARGET_REPO_ROOT" || {
            echo "::error::QA_TARGET_REPO_ROOT is not a directory"
            exit 2
          }
          test -x /opt/homebrew/bin/python3.12 || {
            echo "::error::Homebrew Python 3.12 is not available at /opt/homebrew/bin/python3.12"
            exit 2
          }
          command -v npm >/dev/null || {
            echo "::error::npm is not available on the runner PATH"
            exit 2
          }

      - name: Create isolated Python environment
        shell: bash
        run: |
          venv_path="$RUNNER_TEMP/qa-agents-venv-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          /opt/homebrew/bin/python3.12 -m venv "$venv_path"
          echo "$venv_path/bin" >> "$GITHUB_PATH"
          "$venv_path/bin/python" --version
          "$venv_path/bin/python" -m pip install --no-deps .

      - name: Collect and export website evidence
        run: |
          python -m qa_agents export-public \
            --profile personal_website \
            --base main \
            --head HEAD \
            --command website_validation \
            --stable

      - name: Verify public artifact
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["QA_PUBLIC_ARTIFACT_OUTPUT"])
          artifact = json.loads(path.read_text(encoding="utf-8"))
          encoded = json.dumps(artifact, sort_keys=True)
          forbidden = (
              "/Users/",
              "QA_TARGET_REPO_ROOT",
              "QA_KB_PATH",
              "QA_PUBLIC_ARTIFACT_OUTPUT",
              "stdout_summary",
              "stderr_summary",
          )
          leaked = [value for value in forbidden if value in encoded]
          if leaked:
              raise SystemExit(f"public artifact contains forbidden values: {', '.join(leaked)}")
          if artifact.get("target", {}).get("repository") != "haleyparks329.github.io":
              raise SystemExit("public artifact target is incorrect")
          print(f"verified public artifact: {path}")
          PY

      - name: Validate website with exported artifact
        working-directory: ${{ env.QA_TARGET_REPO_ROOT }}
        run: npm run validate
